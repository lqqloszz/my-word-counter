<!DOCTYPE html>
<html>
<head>
    <meta charset = "UTF-8">
    <title>極簡線上字數計算器</title>
    <style>
        body {font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f5f5f7;}
        h2 {color: #333;}
        textarea {width: 100%; height: 180px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px;}
        input[type = "submit"] {margin-top: 10px; padding: 12px 24px; background: #0071e3; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;}
        input[type = "submit"]:hover{background: #005bb5;}
        .result-box {margin-top: 25px; padding: 15px; background: #e8e8ed; border-radius: 8px; font-size: 18px; font-weight: bold; color: #1d1d1f;}

        /*廣告欄位*/
        .ad-banner {margin: 25px 0; padding: 20px; background: #fff3cd; border: 2px dashed #ffc107; border-radius: 8px; text-align: center; color: #856404; font-size: 14px;}
    </style>
</head>
<body>
    <h2>線上字數計算器</h2>
    <p>請在下方輸入文字，系統將自動計算字數 (含標點符號與空格)。</p>

    <div class = "ad-banner">
        【廣告預留位:Banner 728x90】<br>
        <small>當你通過 Google AdSense 或 Adsterra 審核後，將廣告代碼貼到此處，這裡就會顯示真正的賺錢廣告。</small>
    </div>

    <form method = "POST">
        <textarea name = "text_input" placeholder = "請在此處輸入或貼上您的文章..."></textarea>
        <br>
        <input type = "submit" value = "開始計算字數">
    </form>

    <div class = "result-box">
        目前總字數:<span style = "color: #0071e3;">{{ count }}</span> 字
    </div>
    <div class = "ad-banner">
        【廣告預留位:相關內容推薦廣告】
    </div>
</body>
</html>
